name: Publish

on:
  push:
    tags:
      - '[0-9]*'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        # CGO_ENABLED=0: without this, go builds a dynamically-linked
        # binary whose ELF interpreter (/lib64/ld-linux-x86-64.so.2)
        # doesn't exist in the nix-built container image, so the
        # container fails to start with a misleading "no such file or
        # directory" / "required file not found" error on the entrypoint.
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o worker .

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@v15
        with:
          name: devenv

      - run: nix profile install nixpkgs#devenv

      - name: Build and push image
        run: |
          VERSION="${{ github.ref_name }}"
          CONTAINERS_REGISTRIES_CONF=/dev/null devenv container copy \
            --registry docker://ghcr.io/junctionio/ \
            --copy-args="--dest-creds ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            system-worker
          CONTAINERS_REGISTRIES_CONF=/dev/null nix run nixpkgs#skopeo -- copy \
            --src-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            docker://ghcr.io/junctionio/system-worker:latest \
            docker://ghcr.io/junctionio/system-worker:${VERSION}
